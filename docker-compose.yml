services:
  mysql:
    image: mysql:8.0
    container_name: exam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: exam_platform
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - exam_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: exam-redis
    ports:
      - "6380:6379"

volumes:
  exam_mysql_data:
