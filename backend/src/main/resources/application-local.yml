spring:
  datasource:
    url: jdbc:h2:mem:exam_platform;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

---

# 本地 profile：H2 + 不启用 Redis（SubmitLock 使用 Noop）
app:
  redis:
    enabled: false
  seed:
    demo-data-enabled: true
  auth:
    public-registration-enabled: ${APP_PUBLIC_REGISTRATION_ENABLED:true}
    demo-password-reset-enabled: ${APP_DEMO_PASSWORD_RESET_ENABLED:false}
